<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Tilt Gadget</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#44ff44">
<link rel="icon" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; }
  
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #0a0a0a;
    min-height: 100vh;
    color: #fff;
    font-size: 12px;
    overflow-x: hidden;
  }
  
  .ana-konteyner {
    max-width: 420px;
    margin: 0 auto;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  
  .gadget {
    background: linear-gradient(135deg, #131313 0%, #0a0a0a 100%);
    border-left: 1px solid rgba(68, 255, 68, 0.18);
    border-right: 1px solid rgba(68, 255, 68, 0.18);
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }
  
  .gadget-ust {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 16px;
    background: rgba(0, 0, 0, 0.4);
    border-bottom: 1px solid rgba(68, 255, 68, 0.1);
    flex-shrink: 0;
  }
  
  .ust-sol { display: flex; align-items: center; gap: 10px; }
  .baslik { font-size: 14px; font-weight: 700; color: #44ff44; letter-spacing: 0.5px; }
  
  .durum-rozet {
    display: flex; align-items: center; gap: 5px;
    font-size: 11px; font-weight: 600; color: #ffaa00;
  }
  .durum-rozet.bagli { color: #44ff44; }
  .durum-rozet.hata { color: #ff4444; }
  
  .durum-nokta {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: currentColor;
    box-shadow: 0 0 6px currentColor;
    animation: nabiz 2s infinite;
  }
  @keyframes nabiz { 0%,100%{opacity:1;} 50%{opacity:0.4;} }
  
  .icon-btn {
    width: 28px; height: 26px;
    border: 1px solid rgba(68, 255, 68, 0.3);
    background: rgba(68, 255, 68, 0.05);
    color: #44ff44;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
  }
  .icon-btn:hover { background: rgba(68, 255, 68, 0.18); }
  .icon-btn.aktif { background: rgba(68, 255, 68, 0.25); border-color: #44ff44; }
  
  .gadget-icerik {
    padding: 12px;
    overflow-y: auto;
    flex: 1;
  }
  
  .kisi-blogu {
    background: rgba(255, 255, 255, 0.025);
    border: 1px solid rgba(68, 255, 68, 0.08);
    border-radius: 12px;
    padding: 12px;
    margin-bottom: 12px;
    transition: opacity 0.4s, filter 0.4s, border-color 0.4s, box-shadow 0.4s;
  }
  .kisi-blogu.kisi-offline {
    opacity: 0.35;
    filter: grayscale(85%);
    border-color: rgba(255, 68, 68, 0.2);
  }
  .kisi-blogu.kisi-online {
    border-color: rgba(68, 255, 68, 0.3);
    box-shadow: 0 0 14px rgba(68, 255, 68, 0.08);
  }
  
  .kisi-baslik { display: flex; align-items: center; margin-bottom: 10px; }
  .kisi-sol { display: flex; align-items: center; gap: 10px; }
  
  .kisi-avatar {
    width: 44px; height: 44px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid rgba(68, 255, 68, 0.5);
    background: #2a2a2a;
  }
  .kisi-blogu.kisi-offline .kisi-avatar { border-color: rgba(255, 68, 68, 0.3); }
  
  .kisi-bilgi { display: flex; flex-direction: column; gap: 3px; }
  .kisi-isim { font-size: 18px; font-weight: 700; color: #fff; line-height: 1; }
  .kisi-durum-yazi { font-size: 11px; font-weight: 600; line-height: 1; }
  .kisi-durum-yazi.online { color: #44ff44; }
  .kisi-durum-yazi.offline { color: #ff4444; }
  
  .esp-kartlari { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  
  .esp-kart {
    background: rgba(0, 0, 0, 0.4);
    border-radius: 9px;
    padding: 8px;
    border: 1px solid rgba(68, 255, 68, 0.15);
    transition: all 0.3s;
  }
  .esp-kart.online { border-color: rgba(68, 255, 68, 0.45); }
  .esp-kart.offline { border-color: rgba(255, 68, 68, 0.3); }
  
  .kart-ust { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
  .kart-etiket { font-size: 12px; font-weight: 700; color: #44ff44; letter-spacing: 1px; }
  .esp-kart.offline .kart-etiket { color: #aa6666; }
  
  .kart-durum-isareti {
    width: 18px; height: 18px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: bold;
  }
  .kart-durum-isareti.online {
    background: #44ff44; color: #000;
    box-shadow: 0 0 7px rgba(68, 255, 68, 0.6);
  }
  .kart-durum-isareti.offline { background: #ff4444; color: #fff; }
  
  .ayakkabi-img {
    width: 100%; height: 50px;
    object-fit: contain;
    margin: 3px 0 6px;
  }
  .esp-kart.offline .ayakkabi-img { filter: grayscale(100%) brightness(0.5); }
  
  .tilt-daireleri { display: flex; justify-content: center; gap: 7px; margin-bottom: 7px; }
  
  .tilt-daire {
    width: 18px; height: 18px;
    border-radius: 50%;
    border: 2px solid;
    transition: all 0.25s;
  }
  .tilt-daire.online {
    border-color: #44ff44;
    background: transparent;
    box-shadow: 0 0 5px rgba(68, 255, 68, 0.4);
  }
  .tilt-daire.aktif {
    border-color: #44ff44;
    background: #44ff44;
    box-shadow: 0 0 13px rgba(68, 255, 68, 0.9);
    animation: aktif-puls 0.8s infinite;
  }
  @keyframes aktif-puls {
    0%,100% { box-shadow: 0 0 13px rgba(68, 255, 68, 0.9); transform: scale(1); }
    50% { box-shadow: 0 0 20px rgba(68, 255, 68, 1); transform: scale(1.15); }
  }
  .tilt-daire.offline { border-color: #ff4444; background: transparent; }
  
  .wifi-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
    font-size: 11px;
    color: #888;
    padding-top: 5px;
    border-top: 1px solid rgba(255, 255, 255, 0.05);
  }
  .wifi-row.iyi { color: #44ff44; }
  .wifi-row.orta { color: #ffaa00; }
  .wifi-row.zayif { color: #ff6666; }
  .wifi-isim { font-weight: 600; max-width: 100px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  
  .sinyal-bar { display: inline-flex; align-items: flex-end; gap: 1px; height: 10px; }
  .sinyal-bar div { width: 2px; background: currentColor; border-radius: 1px; }
  .sinyal-bar div:nth-child(1) { height: 30%; }
  .sinyal-bar div:nth-child(2) { height: 55%; }
  .sinyal-bar div:nth-child(3) { height: 80%; }
  .sinyal-bar div:nth-child(4) { height: 100%; }
  .sinyal-bar div.sonuk { background: #444; }
  
  .gadget-alt {
    padding: 8px 14px;
    background: rgba(0, 0, 0, 0.5);
    border-top: 1px solid rgba(68, 255, 68, 0.1);
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 10px;
    color: #888;
    flex-shrink: 0;
  }
  .alt-istatistik { display: flex; gap: 12px; }
  .alt-istatistik b { color: #44ff44; }
  .alt-istatistik .aktif b { color: #ff4444; }
  
  /* Pencere boyutu uyumu */
  @media (min-width: 600px) {
    .ana-konteyner { box-shadow: 0 0 30px rgba(0,0,0,0.8); }
  }
</style>
</head>
<body>

<div class="ana-konteyner">
  <div class="gadget">
    
    <div class="gadget-ust">
      <div class="ust-sol">
        <span class="baslik">TİLT</span>
        <div class="durum-rozet" id="durumRozet">
          <span class="durum-nokta"></span>
          <span id="durumYazi">Bağlanıyor</span>
        </div>
      </div>
      <button class="icon-btn" onclick="sesAcKapa()" id="sesBtn" title="Ses uyarısı">🔇</button>
    </div>
    
    <div class="gadget-icerik">
      
      <!-- EFE -->
      <div class="kisi-blogu kisi-offline" id="kisi-efe">
        <div class="kisi-baslik">
          <div class="kisi-sol">
            <img src="efe.png" class="kisi-avatar" alt="Efe">
            <div class="kisi-bilgi">
              <div class="kisi-isim">Efe</div>
              <div class="kisi-durum-yazi offline" id="durum-yazi-efe">● Bağlı Değil</div>
            </div>
          </div>
        </div>
        <div class="esp-kartlari">
          <div class="esp-kart offline" id="kart-esp1">
            <div class="kart-ust">
              <div class="kart-etiket">SAĞ</div>
              <div class="kart-durum-isareti offline" id="isaret-esp1">✕</div>
            </div>
            <img src="gri.png" class="ayakkabi-img" alt="Efe Sağ">
            <div class="tilt-daireleri">
              <div class="tilt-daire offline" id="d-Efe-1"></div>
              <div class="tilt-daire offline" id="d-Efe-2"></div>
              <div class="tilt-daire offline" id="d-Efe-3"></div>
            </div>
            <div class="wifi-row" id="wifi-esp1">
              <div class="sinyal-bar"><div class="sonuk"></div><div class="sonuk"></div><div class="sonuk"></div><div class="sonuk"></div></div>
              <span class="wifi-isim">—</span>
            </div>
          </div>
          <div class="esp-kart offline" id="kart-esp2">
            <div class="kart-ust">
              <div class="kart-etiket">SOL</div>
              <div class="kart-durum-isareti offline" id="isaret-esp2">✕</div>
            </div>
            <img src="gri.png" class="ayakkabi-img" alt="Efe Sol" style="transform:scaleX(-1)">
            <div class="tilt-daireleri">
              <div class="tilt-daire offline" id="d-Efe-4"></div>
              <div class="tilt-daire offline" id="d-Efe-5"></div>
              <div class="tilt-daire offline" id="d-Efe-6"></div>
            </div>
            <div class="wifi-row" id="wifi-esp2">
              <div class="sinyal-bar"><div class="sonuk"></div><div class="sonuk"></div><div class="sonuk"></div><div class="sonuk"></div></div>
              <span class="wifi-isim">—</span>
            </div>
          </div>
        </div>
      </div>
      
      <!-- KAYRA -->
      <div class="kisi-blogu kisi-offline" id="kisi-kayra">
        <div class="kisi-baslik">
          <div class="kisi-sol">
            <img src="kayra.png" class="kisi-avatar" alt="Kayra">
            <div class="kisi-bilgi">
              <div class="kisi-isim">Kayra</div>
              <div class="kisi-durum-yazi offline" id="durum-yazi-kayra">● Bağlı Değil</div>
            </div>
          </div>
        </div>
        <div class="esp-kartlari">
          <div class="esp-kart offline" id="kart-esp3">
            <div class="kart-ust">
              <div class="kart-etiket">SAĞ</div>
              <div class="kart-durum-isareti offline" id="isaret-esp3">✕</div>
            </div>
            <img src="siyah.png" class="ayakkabi-img" alt="Kayra Sağ">
            <div class="tilt-daireleri">
              <div class="tilt-daire offline" id="d-Kayra-1"></div>
              <div class="tilt-daire offline" id="d-Kayra-2"></div>
              <div class="tilt-daire offline" id="d-Kayra-3"></div>
            </div>
            <div class="wifi-row" id="wifi-esp3">
              <div class="sinyal-bar"><div class="sonuk"></div><div class="sonuk"></div><div class="sonuk"></div><div class="sonuk"></div></div>
              <span class="wifi-isim">—</span>
            </div>
          </div>
          <div class="esp-kart offline" id="kart-esp4">
            <div class="kart-ust">
              <div class="kart-etiket">SOL</div>
              <div class="kart-durum-isareti offline" id="isaret-esp4">✕</div>
            </div>
            <img src="siyah.png" class="ayakkabi-img" alt="Kayra Sol" style="transform:scaleX(-1)">
            <div class="tilt-daireleri">
              <div class="tilt-daire offline" id="d-Kayra-4"></div>
              <div class="tilt-daire offline" id="d-Kayra-5"></div>
              <div class="tilt-daire offline" id="d-Kayra-6"></div>
            </div>
            <div class="wifi-row" id="wifi-esp4">
              <div class="sinyal-bar"><div class="sonuk"></div><div class="sonuk"></div><div class="sonuk"></div><div class="sonuk"></div></div>
              <span class="wifi-isim">—</span>
            </div>
          </div>
        </div>
      </div>
      
    </div>
    
    <div class="gadget-alt">
      <div class="alt-istatistik">
        <span>Online <b id="onlineSayi">0/12</b></span>
        <span class="aktif">Aktif <b id="aktifSayi">0</b></span>
      </div>
      <div id="sonZaman">—</div>
    </div>
    
  </div>
</div>

<script>
const MQTT_HOST = "a071189256ab4689ba5a49d303d873a0.s1.eu.hivemq.cloud";
const MQTT_PORT = 8884;
const MQTT_USER = "tilt_user";
const MQTT_PASS = "zx83bZX83B%";
const MQTT_TOPIC = "klinik/tiltler/#";

const KISI_ESPLERI = { efe: [1, 2], kayra: [3, 4] };

const tiltDurumlari = {};
const tiltSonZaman = {};
const espSonHaber = {};
const espWifi = {};
const espRssi = {};

["Efe-1","Efe-2","Efe-3","Efe-4","Efe-5","Efe-6",
 "Kayra-1","Kayra-2","Kayra-3","Kayra-4","Kayra-5","Kayra-6"]
.forEach(t => { tiltDurumlari[t] = null; tiltSonZaman[t] = null; });

[1,2,3,4].forEach(id => { espSonHaber[id] = null; espWifi[id] = "—"; espRssi[id] = 0; });

let sesAcik = false;
let oncekiAktifSayi = 0;

function sesAcKapa() {
  sesAcik = !sesAcik;
  const btn = document.getElementById("sesBtn");
  btn.textContent = sesAcik ? "🔊" : "🔇";
  btn.classList.toggle("aktif", sesAcik);
  try { localStorage.setItem("tilt_ses", sesAcik ? "1" : "0"); } catch(e) {}
}

try {
  if (localStorage.getItem("tilt_ses") === "1") sesAcKapa();
} catch(e) {}

function uyariSesi() {
  if (!sesAcik) return;
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.frequency.value = 800;
    osc.type = "sine";
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + 0.3);
  } catch(e) {}
}

const durumRozet = document.getElementById("durumRozet");
const durumYazi = document.getElementById("durumYazi");

const istemci = mqtt.connect(`wss://${MQTT_HOST}:${MQTT_PORT}/mqtt`, {
  username: MQTT_USER,
  password: MQTT_PASS,
  clientId: "Web_" + Math.random().toString(16).substr(2, 8),
  clean: true,
  reconnectPeriod: 3000,
  keepalive: 30
});

istemci.on("connect", () => {
  durumRozet.className = "durum-rozet bagli";
  durumYazi.textContent = "Bağlı";
  istemci.subscribe(MQTT_TOPIC);
});

istemci.on("error", () => {
  durumRozet.className = "durum-rozet hata";
  durumYazi.textContent = "Hata";
});

istemci.on("close", () => {
  durumRozet.className = "durum-rozet";
  durumYazi.textContent = "Bağlanıyor";
});

istemci.on("message", (topic, mesaj) => {
  try {
    const veri = JSON.parse(mesaj.toString());
    const espId = veri.esp;
    espSonHaber[espId] = Date.now();
    espWifi[espId] = veri.wifi || "?";
    espRssi[espId] = veri.rssi || 0;
    
    if (veri.tilts) {
      veri.tilts.forEach(t => {
        if (t.isim in tiltDurumlari) {
          tiltDurumlari[t.isim] = t.durum;
          tiltSonZaman[t.isim] = Date.now();
        }
      });
    }
  } catch (e) {}
});

function sinyalSeviyesi(rssi) {
  if (rssi >= -55) return 4;
  if (rssi >= -65) return 3;
  if (rssi >= -75) return 2;
  if (rssi >= -85) return 1;
  return 0;
}

function sinyalKalite(rssi) {
  if (rssi >= -60) return "iyi";
  if (rssi >= -75) return "orta";
  return "zayif";
}

function uiGuncelle() {
  const simdi = Date.now();
  let onlineCount = 0;
  let aktifCount = 0;
  
  for (const isim of Object.keys(tiltDurumlari)) {
    const sonZaman = tiltSonZaman[isim];
    const durum = tiltDurumlari[isim];
    const offline = !sonZaman || (simdi - sonZaman) > 3000;
    const daire = document.getElementById("d-" + isim);
    if (!daire) continue;
    
    if (offline) {
      daire.className = "tilt-daire offline";
    } else {
      onlineCount++;
      if (durum == 1) {
        aktifCount++;
        daire.className = "tilt-daire aktif";
      } else {
        daire.className = "tilt-daire online";
      }
    }
  }
  
  for (const espId of [1, 2, 3, 4]) {
    const sonHaber = espSonHaber[espId];
    const online = sonHaber && (simdi - sonHaber) <= 3000;
    
    const kart = document.getElementById("kart-esp" + espId);
    const isaret = document.getElementById("isaret-esp" + espId);
    const wifiEl = document.getElementById("wifi-esp" + espId);
    
    if (online) {
      kart.className = "esp-kart online";
      isaret.className = "kart-durum-isareti online";
      isaret.textContent = "✓";
      
      const rssi = espRssi[espId];
      const wifi = espWifi[espId];
      const kalite = sinyalKalite(rssi);
      const seviye = sinyalSeviyesi(rssi);
      
      const barlarHTML = [];
      for (let i = 0; i < 4; i++) {
        barlarHTML.push(`<div class="${i < seviye ? '' : 'sonuk'}"></div>`);
      }
      
      wifiEl.className = "wifi-row " + kalite;
      wifiEl.innerHTML = `
        <div class="sinyal-bar">${barlarHTML.join('')}</div>
        <span class="wifi-isim" title="${wifi} (${rssi} dBm)">${wifi}</span>
      `;
    } else {
      kart.className = "esp-kart offline";
      isaret.className = "kart-durum-isareti offline";
      isaret.textContent = "✕";
      wifiEl.className = "wifi-row";
      wifiEl.innerHTML = `
        <div class="sinyal-bar"><div class="sonuk"></div><div class="sonuk"></div><div class="sonuk"></div><div class="sonuk"></div></div>
        <span class="wifi-isim">Bağlantı yok</span>
      `;
    }
  }
  
  for (const [kisi, espler] of Object.entries(KISI_ESPLERI)) {
    const enAzBiriOnline = espler.some(id => 
      espSonHaber[id] && (simdi - espSonHaber[id]) <= 3000
    );
    const kisiBlok = document.getElementById("kisi-" + kisi);
    const durumYaziEl = document.getElementById("durum-yazi-" + kisi);
    
    if (enAzBiriOnline) {
      kisiBlok.className = "kisi-blogu kisi-online";
      durumYaziEl.className = "kisi-durum-yazi online";
      durumYaziEl.textContent = "● Bağlı";
    } else {
      kisiBlok.className = "kisi-blogu kisi-offline";
      durumYaziEl.className = "kisi-durum-yazi offline";
      durumYaziEl.textContent = "● Bağlı Değil";
    }
  }
  
  if (aktifCount > oncekiAktifSayi && sesAcik) uyariSesi();
  oncekiAktifSayi = aktifCount;
  
  document.getElementById("onlineSayi").textContent = `${onlineCount}/12`;
  document.getElementById("aktifSayi").textContent = aktifCount;
  document.getElementById("sonZaman").textContent = new Date().toTimeString().substr(0, 8);
}

setInterval(uiGuncelle, 200);
uiGuncelle();

// PWA - service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>

</body>
</html>
